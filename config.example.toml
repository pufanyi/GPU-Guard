# GPU Guard Configuration

[monitor]
# Check interval in seconds
interval_secs = 600
# GPU utilization threshold (percentage, 0-100)
# Alert when usage falls below this value
gpu_utilization_threshold = 10.0
# Memory utilization threshold (percentage, 0-100, optional)
# memory_utilization_threshold = 10.0

[telegram]
bot_token = ""
chat_id = ""
# Optional: restrict who can send commands (defaults to chat_id)
# allowed_chat_ids = ["123456789"]

[tasks]
# Max concurrent managed tasks
max_tasks = 16
# Lines kept per task in the log ring buffer
log_ring_size = 500
